  <style>
    /* ── CSS VARIABLES — TEMA DEFAULT ── */
    :root {
      --bg:#f7f8fc; --bg2:#fff; --bg3:#f0f2f8; --bg4:#e4e7f1;
      --text:#0f172a; --text2:#334155; --text3:#6b7280; --text4:#9ca3af;
      --border:#e4e7f1; --border2:#c8cdd9;
      --blue:#1a56db; --bll:#eef2ff;
      --green:#0d9f6e; --gll:#ecfdf5;
      --red:#e02424; --rll:#fff1f1;
      --amber:#c47b10; --all:#fffbeb;
      --purple:#6d28d9; --pll:#f5f3ff;
      --teal:#0e7490;
      --almacen:#d97706; --sot:#2563eb; --fira:#059669;
      --r:6px; --r2:10px; --r3:16px;
      --sh:0 1px 3px rgba(0,0,0,.06);
      --sh2:0 4px 16px rgba(0,0,0,.1)
    }

    /* ── TEMA DARK ── */
    [data-theme="dark"] {
      --bg:#0f172a; --bg2:#1e293b; --bg3:#0f172a; --bg4:#1e293b;
      --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b; --text4:#475569;
      --border:#1e293b; --border2:#334155;
      --bll:#1e3a5f33; --gll:#00b89a15; --rll:#7f1d1d33;
      --all:#451a0333; --pll:#2e106533;
      --sh:0 1px 3px rgba(0,0,0,.4);
      --sh2:0 8px 32px rgba(0,0,0,.6)
    }

    /* ── TEMA SOFT ── */
    [data-theme="soft"] {
      --bg:#fdf6e3; --bg2:#fffef9; --bg3:#f5ead0; --bg4:#eddfc0;
      --text:#2c2510; --text2:#5c4a1e; --text3:#8a7340; --text4:#b09060;
      --border:#e8d9b0; --border2:#d4c088;
      --bll:#e8f0ff; --gll:#e6f7ee; --rll:#fff1f1;
      --all:#fff8e1; --pll:#f3e8ff;
      --sh:0 1px 3px rgba(0,0,0,.06);
      --sh2:0 4px 16px rgba(0,0,0,.12)
    }

    /* ── TEMA CONTRAST ── */
    [data-theme="contrast"] {
      --bg:#000; --bg2:#111; --bg3:#0a0a0a; --bg4:#1a1a1a;
      --text:#fff; --text2:#e0e0e0; --text3:#aaa; --text4:#888;
      --border:#333; --border2:#555;
      --bll:#001a3a; --gll:#001a0d; --rll:#1a0000;
      --all:#1a1000; --pll:#1a0033;
      --sh:0 2px 8px rgba(0,0,0,.8);
      --sh2:0 8px 32px rgba(0,0,0,.9)
    }

    /* ── BASE ── */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden
    }

    /* ── APP ROOT — la UI se inyecta aquí desde JS ── */
    #app-root {
      width: 100%;
      min-height: 100vh
    }

    /* ── LOADING SCREEN ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease-out
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none
    }

    .ls-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px
    }

    .ls-logo {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .ls-logo svg {
      width: 36px;
      height: 36px
    }

    .ls-name {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.5px;
      color: var(--text)
    }

    .ls-name span {
      color: var(--text3);
      font-weight: 400
    }

    .ls-ring {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: ls-spin 0.9s linear infinite
    }

    .ls-version {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text4);
      letter-spacing: .05em
    }

    @keyframes ls-spin {
      to { transform: rotate(360deg) }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; height: 4px }
    ::-webkit-scrollbar-track { background: var(--bg3) }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px }
  </style>
</head>
<body>

  <!-- App root: la UI se monta aquí via JS -->
  <div id="app-root"></div>

  <!-- Loading screen: visible hasta que app.js termine de inicializar -->
  <div id="loading-screen">
    <div class="ls-inner">
      <div class="ls-logo">
        <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
          <rect width="140" height="140" rx="32" fill="#030812"/>
          <polygon points="70,10 122,40 122,100 70,130 18,100 18,40" stroke="#00ffc8" stroke-width="2" fill="#00ffc808"/>

          <polygon points="70,46 90,57 90,83 70,94 50,83 50,57" stroke="#00ffc8" stroke-width=".8" fill="none" opacity=".2"/>
          <line x1="70" y1="10" x2="70" y2="130" stroke="#00ffc8" stroke-width=".6" opacity=".1"/>
          <line x1="18" y1="40" x2="122" y2="100" stroke="#00ffc8" stroke-width=".6" opacity=".1"/>
          <line x1="122" y1="40" x2="18" y2="100" stroke="#00ffc8" stroke-width=".6" opacity=".1"/>
          <circle cx="70" cy="70" r="16" fill="#00ffc8" opacity=".1"/>
          <circle cx="70" cy="70" r="9" fill="#00ffc8"/>
          <circle cx="70" cy="70" r="3.5" fill="#030812"/>
        </svg>
        <div class="ls-name">BeUnify<span>T</span></div>
      </div>
      <div class="ls-ring"></div>
      <div class="ls-version">v7.0.0 · initializing</div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // FIREBASE CONFIG — PRODUCCIÓN
    // Estas claves son públicas por diseño (van en el cliente)
    // La seguridad se gestiona con Firebase Security Rules
    // ═══════════════════════════════════════════════════════════
    window.FIREBASE_CONFIG = {
      apiKey:            "AIzaSyBKMfHEcnRAJJ9zotIXu3hluFpyjwQDfq4",
      authDomain:        "beunifyt-prod.firebaseapp.com",
      projectId:         "beunifyt-prod",
      storageBucket:     "beunifyt-prod.firebasestorage.app",
      messagingSenderId: "392352190516",
      appId:             "1:392352190516:web:fb4431ca96ab29a5feba61"
    };

    // ═══════════════════════════════════════════════════════════
    // GLOBALS
    // ═══════════════════════════════════════════════════════════
    window.APP_VERSION   = "7.0.0";
    window.ENVIRONMENT   = "production";

    // Ocultar loading screen — llamado desde app.js cuando la UI está lista
    window.hideLoadingScreen = function() {
      const el = document.getElementById('loading-screen');
      if (!el) return;
      el.classList.add('hidden');
      setTimeout(() => el.remove(), 450);
    };

    // Aplicar tema guardado antes de que cargue JS (evita flash)
    (function() {
      const saved = localStorage.getItem('beu_theme');
      if (saved && saved !== 'default') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    })();
  </script>

  <!-- Entry point — todos los módulos se cargan desde aquí -->
  <script type="module" src="./js/app.js"></script>

</body>
