<style>
/* ─── CSS VARIABLES (temas) ─────────────────────────── */
:root{
  --bg:#f7f8fc;--bg2:#fff;--bg3:#f0f2f8;--bg4:#e4e7f1;
  --text:#0f172a;--text2:#334155;--text3:#6b7280;--text4:#9ca3af;
  --border:#e4e7f1;--border2:#c8cdd9;
  --blue:#1a56db;--bll:#eef2ff;
  --green:#0d9f6e;--gll:#ecfdf5;
  --red:#e02424;--rll:#fff1f1;
  --amber:#c47b10;--all:#fffbeb;
  --purple:#6d28d9;--teal:#0d9f6e;
  --r:6px;--r2:10px;--sh:0 1px 3px rgba(0,0,0,.06)
}
[data-theme="dark"]{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#0f172a;--bg4:#1e293b;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
  --border:#1e293b;--border2:#334155;
  --bll:#1e3a5f33;--gll:#00b89a15;--rll:#7f1d1d33;--all:#451a0333;
  --sh:0 1px 3px rgba(0,0,0,.4)
}
[data-theme="soft"]{
  --bg:#fdf6e3;--bg2:#fffef9;--bg3:#f5ead0;--bg4:#eddfc0;
  --text:#2c2510;--text2:#5c4a1e;--text3:#8a7340;--text4:#b09060;
  --border:#e8d9b0;--border2:#d4c088
}
[data-theme="contrast"]{
  --bg:#000;--bg2:#111;--bg3:#0a0a0a;--bg4:#1a1a1a;
  --text:#fff;--text2:#e0e0e0;--text3:#aaa;--text4:#888;
  --border:#333;--border2:#555
}

/* ─── RESET ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ─── SPLASH SCREEN ─────────────────────────────────── */
#splash{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;z-index:9999;
  transition:opacity .4s ease;
}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{display:flex;align-items:center;gap:12px}
.splash-logo span{font-family:monospace;font-size:28px;font-weight:700;color:var(--text)}
.splash-logo .teal{color:#00b89a}
.spinner{
  width:36px;height:36px;
  border:3px solid var(--border2);
  border-top-color:#2563eb;
  border-radius:50%;
  animation:spin .7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.splash-status{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.splash-version{position:absolute;bottom:20px;font-size:10px;color:var(--text4)}

/* ─── ERROR SCREEN ──────────────────────────────────── */
#errorScreen{
  position:fixed;inset:0;background:var(--bg);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;padding:24px;z-index:9999
}
#errorScreen .err-icon{font-size:48px}
#errorScreen .err-title{font-size:20px;font-weight:800;color:var(--text)}
#errorScreen .err-msg{font-size:13px;color:var(--text3);text-align:center;max-width:400px;line-height:1.6}
#errorScreen button{
  margin-top:8px;padding:10px 24px;
  border:none;border-radius:20px;
  background:#2563eb;color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit
}

/* ─── APP SHELL ─────────────────────────────────────── */
#appShell{display:none}
</style>
</head>
<body>

<!-- ══════════════ SPLASH ══════════════ -->
<div id="splash">
  <div class="splash-logo">
    <svg viewBox="0 0 140 140" width="40" height="40">
      <rect width="140" height="140" rx="28" fill="#030812"/>
      <polygon points="70,10 122,40 122,100 70,130 18,100 18,40" stroke="#00ffc8" stroke-width="2" fill="#00ffc808"/>
      <polygon points="70,28 106,49 106,91 70,112 34,91 34,49" stroke="#00ffc8" stroke-width="1.2" fill="none" opacity="0.5"/>
      <circle cx="70" cy="70" r="9" fill="#00ffc8"/>
      <circle cx="70" cy="70" r="3.5" fill="#030812"/>
    </svg>
    <span><span class="teal">Be</span>Unify<span class="teal">T</span></span>
  </div>
  <div class="spinner"></div>
  <div class="splash-status" id="splashStatus">initializing…</div>
  <div class="splash-version">v7.0.0</div>
</div>

<!-- ══════════════ ERROR SCREEN ══════════════ -->
<div id="errorScreen">
  <div class="err-icon">⚠️</div>
  <div class="err-title">Error de inicio</div>
  <div class="err-msg" id="errMsg">Ha ocurrido un error al iniciar la aplicación.</div>
  <button onclick="location.reload()">🔄 Reintentar</button>
</div>

<!-- ══════════════ APP SHELL (modules inject here) ══════════════ -->
<div id="appShell"></div>

<!-- ══════════════ FIREBASE CONFIG ══════════════ -->
<script>
// Firebase config — v7 Firestore (europe-west1)
// Se puede sobreescribir desde window.BEU_CONFIG antes de cargar app.js
window.BEU_CONFIG = {
  apiKey:            "AIzaSyBKMfHEcnRAJJ9zotIXu3hluFpyjwQDfq4",
  authDomain:        "beunifyt-prod.firebaseapp.com",
  projectId:         "beunifyt-prod",
  storageBucket:     "beunifyt-prod.firebasestorage.app",
  messagingSenderId: "461765955172",
  appId:             "1:461765955172:web:0000000000000000000000",
};

// ── Splash helpers ──────────────────────────────────────
function setSplashStatus(msg) {
  var el = document.getElementById('splashStatus');
  if (el) el.textContent = msg;
}
function hideSplash() {
  var el = document.getElementById('splash');
  if (el) { el.classList.add('hide'); setTimeout(function(){ el.style.display='none'; }, 450); }
}
function showError(msg) {
  hideSplash();
  var es = document.getElementById('errorScreen');
  var em = document.getElementById('errMsg');
  if (es) es.style.display = 'flex';
  if (em) em.textContent = msg || 'Error desconocido';
}

// ── Apply saved theme before anything renders ──────────────
(function() {
  try {
    var theme = localStorage.getItem('beu_theme') || 'default';
    document.documentElement.setAttribute('data-theme', theme);
  } catch(e) {}
})();

window.addEventListener('unhandledrejection', function(e) {
  console.error('[BEU] Unhandled:', e.reason);
  // Only show error screen for fatal errors at init time
});
</script>

<!-- ══════════════ BOOTSTRAP ══════════════ -->
<script type="module">
  // Progress messages while loading
  setSplashStatus('loading modules…');

  try {
    // Dynamically import app.js — the entry point
    // It handles: Firestore init → AppState → Auth → UI
    const { default: _unused } = await import('./js/app.js')
      .catch(async () => {
        // Fallback: try relative paths for GitHub Pages
        return import('/beunifyt-v7/js/app.js');
      });
  } catch(initErr) {
    console.error('[BEU] Bootstrap error:', initErr);
    showError('No se pudo iniciar la aplicación.\n\n' + (initErr?.message || initErr));
  }
</script>

</body>
